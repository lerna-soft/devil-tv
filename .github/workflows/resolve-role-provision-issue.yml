name: Resolve role provision issue

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: write
  issues: write

concurrency:
  group: role-provision-queue
  cancel-in-progress: false

jobs:
  resolve:
    if: contains(github.event.issue.labels.*.name, 'role-provision')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4

      - name: Configure git identity
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync, commit and push changes (retry-safe)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euxo pipefail
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git checkout -B main origin/main
            node tools/sync-role-provision-from-issues.mjs
            git add assets/users assets/roles
            if git diff --cached --quiet; then
              echo "No staged changes."
              exit 0
            fi
            git commit -m "sync roles/users from issue #${{ github.event.issue.number }}"
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push rejected on attempt ${attempt}; retrying from latest origin/main"
          done
          echo "Failed to push after retries"
          exit 1

      - name: Close synced role provision issues
        if: success()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euxo pipefail
          node tools/close-role-provision-issues.mjs
