name: Deploy static site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4

      - name: Preflight (log context)
        shell: bash
        run: |
          set -euxo pipefail
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
          echo "actor=${GITHUB_ACTOR}"
          echo "runner=$(uname -a)"
          echo "pwd=$(pwd)"
          ls -la
          du -sh . || true
          test -f index.html
          test -f app.js
          test -f styles.css

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build episode assets (manifest + per-series files)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euxo pipefail
          node tools/sync-episode-targets-from-issues.mjs
          node tools/build-episode-assets.mjs

      - name: Sync watch progress from open issues
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euxo pipefail
          node tools/sync-watch-progress-from-issues.mjs

      - name: Sync catalog seed from open issues
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euxo pipefail
          node tools/sync-catalog-seed-from-issues.mjs

      - name: Upload Pages Artifact (site root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages (may take a while)
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Close synced episode issues
        if: success()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euxo pipefail
          node tools/close-episode-sync-issues.mjs

      - name: Close synced watch progress issues
        if: success()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euxo pipefail
          node tools/close-watch-progress-issues.mjs

      - name: Close synced catalog seed issues
        if: success()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euxo pipefail
          node tools/close-catalog-seed-issues.mjs

      - name: Summary (deployed URL)
        if: always()
        shell: bash
        run: |
          {
            echo "## Deploy summary"
            echo ""
            echo "- Status: \`${{ job.status }}\`"
            echo "- Page URL: \`${{ steps.deployment.outputs.page_url }}\`"
            echo "- SHA: \`${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"
