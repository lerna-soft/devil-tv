name: Deploy static site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4

      - name: Preflight (log context)
        shell: bash
        run: |
          set -euxo pipefail
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"
          echo "actor=${GITHUB_ACTOR}"
          echo "runner=$(uname -a)"
          echo "pwd=$(pwd)"
          ls -la
          du -sh . || true
          test -f index.html
          test -f app.js
          test -f styles.css

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prefetch episode index (local asset for runtime speed)
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p assets
          tmp_file="$(mktemp)"
          if curl -fsSL --max-time 25 "https://vidapi.ru/ids/eps_list_imdb.txt" -o "$tmp_file"; then
            :
          elif curl -fsSL --max-time 35 "https://r.jina.ai/http://vidapi.ru/ids/eps_list_imdb.txt" -o "$tmp_file"; then
            :
          else
            echo "Could not fetch episode index from remote sources"
            exit 1
          fi
          # Normalize potential jina prefix and keep only imdb episode ids lines.
          awk '/^tt[0-9]+_[0-9]+x[0-9]+/ {print}' "$tmp_file" > assets/eps_list_imdb.txt
          test -s assets/eps_list_imdb.txt
          echo "Episode index lines: $(wc -l < assets/eps_list_imdb.txt)"

      - name: Upload Pages Artifact (site root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages (may take a while)
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Summary (deployed URL)
        if: always()
        shell: bash
        run: |
          {
            echo "## Deploy summary"
            echo ""
            echo "- Status: \`${{ job.status }}\`"
            echo "- Page URL: \`${{ steps.deployment.outputs.page_url }}\`"
            echo "- SHA: \`${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"
