name: Solicitar recuperación de contraseña
description: Recupera el acceso a tu cuenta de Devil TV. Recibirás un correo con un link para crear una nueva contraseña.
title: "Password reset request"
labels:
  - password-reset
body:
  - type: markdown
    attributes:
      value: |
        Si olvidaste tu contraseña, escribe el email con el que te registraste en Devil TV. Recibirás un correo con un link para crear una nueva contraseña. El link expira en 1 hora.

        Por seguridad: no compartas tu contraseña ni el link de recuperación con nadie.
  - type: input
    id: email
    attributes:
      label: Tu email
      description: El email con el que te registraste en Devil TV
      placeholder: tu-email@ejemplo.com
    validations:
      required: true
