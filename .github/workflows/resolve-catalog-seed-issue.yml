name: Resolve catalog seed issue

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: write
  issues: write
  actions: write

concurrency:
  group: catalog-seed-sync-queue
  cancel-in-progress: false

jobs:
  resolve:
    if: contains(github.event.issue.labels.*.name, 'catalog-seed-sync')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4

      - name: Configure git identity
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync catalog seed from open issues
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euxo pipefail
          node tools/sync-catalog-seed-from-issues.mjs

      - name: Commit and push changes
        shell: bash
        run: |
          set -euxo pipefail
          if git diff --cached --quiet && git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add assets/catalog.seed.json
          if git diff --cached --quiet; then
            echo "No staged changes."
            exit 0
          fi
          git commit -m "sync catalog seed from issue #${{ github.event.issue.number }}"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git fetch origin main
            git rebase origin/main --autostash
          done
          git push origin HEAD:main

      - name: Trigger Pages deploy
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          gh workflow run "Deploy static site to Pages" --ref main
