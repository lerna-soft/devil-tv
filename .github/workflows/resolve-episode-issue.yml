name: Resolve episode issue

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: write
  issues: read

concurrency:
  group: episode-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  resolve:
    if: contains(github.event.issue.labels.*.name, 'episode-sync')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4

      - name: Configure git identity
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync episode targets from open issues
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euxo pipefail
          node tools/sync-episode-targets-from-issues.mjs
          node tools/build-episode-assets.mjs

      - name: Commit and push changes
        shell: bash
        run: |
          set -euxo pipefail
          if git diff --cached --quiet && git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add assets/episodes/targets.json assets/episodes/index.json assets/episodes/*.txt
          if git diff --cached --quiet; then
            echo "No staged changes."
            exit 0
          fi
          git commit -m "sync episodes from issue #${{ github.event.issue.number }}"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git fetch origin main
            git rebase origin/main --autostash
          done
          git push origin HEAD:main
