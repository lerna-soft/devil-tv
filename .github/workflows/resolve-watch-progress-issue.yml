name: Resolve watch progress issue

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: write
  issues: write
  actions: write

concurrency:
  group: watch-progress-sync-queue
  cancel-in-progress: false

jobs:
  resolve:
    if: contains(github.event.issue.labels.*.name, 'watch-progress-sync')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4

      - name: Configure git identity
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync watch progress from open issues
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WATCH_PROGRESS_MAX_ISSUES: "1"
        run: |
          set -euxo pipefail
          node tools/sync-watch-progress-from-issues.mjs

      - name: Commit and push changes
        shell: bash
        run: |
          set -euxo pipefail
          if git diff --cached --quiet && git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add assets/watch-progress
          if git diff --cached --quiet; then
            echo "No staged changes."
            exit 0
          fi
          git commit -m "sync watch progress from issue #${{ github.event.issue.number }}"
          pushed=0
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              pushed=1
              break
            fi
            git fetch origin main
            git rebase origin/main --autostash
          done
          if [ "$pushed" -ne 1 ]; then
            git push origin HEAD:main
          fi

      - name: Close synced watch progress issues
        if: success()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euxo pipefail
          node tools/close-watch-progress-issues.mjs
