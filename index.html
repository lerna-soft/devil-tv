<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Devil TV</title>
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />
    <link rel="manifest" href="./assets/site.webmanifest" />
    <meta name="theme-color" content="#0a0b12" />
    <script>
      // Cache busting for GitHub Pages + mobile Safari caches.
      // Always load the latest CSS/JS by changing the URL each page load.
      window.__mep_build = Date.now().toString(36);
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = `./styles.css?v=${window.__mep_build}`;
      document.head.appendChild(link);
    </script>
  </head>
  <body>
      <div id="authGate" class="auth-gate" hidden>
      <div class="auth-shell" role="dialog" aria-modal="true" aria-label="Acceso">
        <section class="auth-card auth-card-login" id="loginCard">
          <div class="auth-hero">
            <div class="auth-brand">Devil TV</div>
            <h2 id="authTitleLogin">Iniciar sesión</h2>
          </div>
          <form id="authFormLogin" class="auth-form">
            <label class="auth-field">
              <span>Email</span>
              <input id="authEmailLogin" type="email" autocomplete="username" required />
            </label>
            <label class="auth-field">
              <span>Contraseña</span>
              <input id="authPasswordLogin" type="password" autocomplete="current-password" required />
            </label>
            <button id="authSubmitLogin" type="submit">Entrar</button>
            <p id="authErrorLogin" class="auth-error" aria-live="polite"></p>
            <button id="authToggleLogin" class="auth-toggle" type="button">Crear cuenta</button>
            <button id="authForgotLogin" class="auth-toggle" type="button">¿Olvidaste tu contraseña?</button>
          </form>
        </section>
        <section class="auth-card auth-card-register" id="registerCard">
          <div class="auth-hero">
            <div class="auth-brand">Devil TV</div>
            <h2 id="authTitleRegister">Crear cuenta</h2>
          </div>
          <form id="authFormRegister" class="auth-form">
            <label class="auth-field">
              <span>Nombre</span>
              <input id="authNameRegister" type="text" autocomplete="name" required />
            </label>
            <label class="auth-field">
              <span>Email</span>
              <input id="authEmailRegister" type="email" autocomplete="username" required />
            </label>
            <label class="auth-field">
              <span>Contraseña</span>
              <input id="authPasswordRegister" type="password" autocomplete="new-password" required />
            </label>
            <label class="auth-field">
              <span>Confirmar contraseña</span>
              <input id="authPasswordConfirmRegister" type="password" autocomplete="new-password" required />
            </label>
            <button id="authSubmitRegister" type="submit">Crear cuenta</button>
            <p id="authErrorRegister" class="auth-error" aria-live="polite"></p>
            <button id="authToggleRegister" class="auth-toggle" type="button">Ya tengo cuenta</button>
          </form>
        </section>
      </div>
    </div>

    <main class="shell" id="appShell" hidden>
      <header class="topbar">
        <div class="brand-mark" aria-label="Devil TV">
          <img class="brand-logo" src="./assets/favicon.svg" alt="Devil TV" />
          <span class="brand-word">TV</span>
        </div>
        <div class="topbar-right">
          <nav class="content-tabs" aria-label="Content type">
            <button class="tab active" data-type-tab="all">Inicio</button>
            <button class="tab" data-type-tab="movie">Películas</button>
            <button class="tab" data-type-tab="series">Series</button>
          </nav>
          <div class="user-chip" id="userChip" hidden aria-hidden="true">
            <span class="user-avatar" id="userAvatar" aria-hidden="true"></span>
            <div class="user-meta">
              <span id="userName"></span>
              <span id="userEmail"></span>
            </div>
            <button id="logoutBtn" class="ghost compact" type="button" title="Cerrar sesión">Salir</button>
          </div>
        </div>
      </header>

      <section class="toolbar">
        <div class="filters">
          <div class="search-shell">
            <input id="search" type="search" placeholder="Buscar o usar n:, t:, a:, d:, g:, y: ..." />
            <button id="searchHelpBtn" class="search-help-btn" type="button" aria-label="Cómo usar el buscador" title="Cómo usar el buscador">?</button>
          </div>
          <select id="typeFilter" aria-label="Tipo de contenido" hidden>
            <option value="all">Todo</option>
            <option value="movie">Películas</option>
            <option value="series">Series</option>
          </select>
        </div>
      </section>

      <section class="layout">
        <section class="catalog">
          <div class="catalog-header">
            <h2>Inicio</h2>
            <div class="catalog-header-tools">
              <span id="count">0 títulos</span>
              <select id="genreFilter" aria-label="Filtrar por género">
                <option value="all">Todos los géneros</option>
              </select>
              <select id="sortFilter" aria-label="Ordenar catálogo">
                <option value="relevance">Relevancia</option>
                <option value="az">Título A-Z</option>
                <option value="za">Título Z-A</option>
                <option value="year_desc">Más recientes</option>
                <option value="year_asc">Más antiguas</option>
                <option value="most_watched">Más vistas</option>
                <option value="recommended">Para ti</option>
              </select>
            </div>
          </div>
          <div id="items" class="items">
            <section class="catalog-loading-status" role="status" aria-live="polite" aria-label="Preparando catálogo inicial. 8%">
              <div class="catalog-loading-orb" aria-hidden="true"><span>8%</span></div>
              <div class="catalog-loading-copy">
                <strong>Preparando catálogo inicial</strong>
                <p>Estamos armando las secciones en segundo plano. Puedes empezar a explorar mientras el catálogo se completa.</p>
                <div class="catalog-loading-progress" aria-hidden="true"><span style="width: 8%"></span></div>
              </div>
            </section>
          </div>
        </section>

        <section class="detail" id="detail">
          <div class="empty">Selecciona un título para ver detalles.</div>
        </section>
      </section>

      <footer class="app-footer">
        <div class="app-footer-left">
          <button id="releaseNotesBtn" class="release-badge" type="button" aria-label="Ver versión y cambios">
            <span id="releaseVersionText" class="release-badge-value">Cargando...</span>
          </button>
          <nav class="footer-links" aria-label="Información del proyecto">
            <a href="https://xanadu8812.github.io/" target="_blank" rel="noreferrer">Powered by xanadu8812</a>
          </nav>
        </div>
      </footer>
    </main>

    <script type="module">
      const v = window.__mep_build || Date.now().toString(36);
      import(`./app.js?v=${v}`);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <div id="playerModal" class="player-modal" hidden>
      <div class="player-modal-backdrop" data-close-player></div>
      <div class="player-modal-card">
        <div class="player-controls" id="playerControls"></div>
        <nav class="player-server-tabs" id="playerServerTabs" aria-label="Seleccionar servidor de reproducción"></nav>
        <iframe
          id="player"
          src="about:blank"
          allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
          sandbox="allow-scripts allow-same-origin allow-presentation"
          referrerpolicy="strict-origin-when-cross-origin"
        ></iframe>
      </div>
    </div>

    <button id="floatingReportBtn" class="floating-report-btn" type="button" hidden aria-label="Reportar problema">
      Reportar
    </button>
  </body>
</html>
