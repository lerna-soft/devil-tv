name: Drain watch progress queue

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: watch-progress-sync-queue
  cancel-in-progress: false

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4

      - name: Configure git identity
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Drain watch progress open issues (FIFO)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WATCH_PROGRESS_MAX_ISSUES: "50"
        run: |
          set -euxo pipefail
          node tools/sync-watch-progress-from-issues.mjs

      - name: Commit and push changes
        shell: bash
        run: |
          set -euxo pipefail
          git add assets/watch-progress || true
          if git diff --cached --quiet; then
            echo "No staged changes."
            exit 0
          fi
          git commit -m "drain watch-progress queue"
          pushed=0
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              pushed=1
              break
            fi
            git fetch origin main
            git rebase origin/main --autostash
          done
          if [ "$pushed" -ne 1 ]; then
            git push origin HEAD:main
          fi

      - name: Close synced watch progress issues
        if: success()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euxo pipefail
          node tools/close-watch-progress-issues.mjs
