<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Devil TV</title>
    <script>
      // Cache busting for GitHub Pages + mobile Safari caches.
      // Always load the latest CSS/JS by changing the URL each page load.
      window.__mep_build = Date.now().toString(36);
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = `./styles.css?v=${window.__mep_build}`;
      document.head.appendChild(link);
    </script>
  </head>
  <body>
    <div id="authGate" class="auth-gate" hidden>
      <div class="auth-card" role="dialog" aria-modal="true" aria-label="Login">
        <h2>Login</h2>
        <p class="auth-hint">Acceso restringido.</p>
        <form id="authForm" class="auth-form">
          <label>
            <span>Email</span>
            <input id="authEmail" type="email" autocomplete="username" required />
          </label>
          <label>
            <span>Password</span>
            <input id="authPassword" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit">Entrar</button>
          <p id="authError" class="auth-error" aria-live="polite"></p>
        </form>
      </div>
    </div>

    <main class="shell">
      <header class="topbar">
        <div class="brand-mark" aria-label="Devil TV">
          <img class="brand-logo" src="./assets/logo-devil-transparent.png" alt="Devil TV" />
          <span class="brand-word">TV</span>
        </div>
        <nav class="content-tabs" aria-label="Content type">
          <button class="tab active" data-type-tab="all">Home</button>
          <button class="tab" data-type-tab="movie">Movies</button>
          <button class="tab" data-type-tab="series">Series</button>
        </nav>
      </header>

      <section class="toolbar">
        <div class="filters">
          <input id="search" type="search" placeholder="Buscar título..." />
          <select id="typeFilter" aria-label="Content type">
            <option value="all">All</option>
            <option value="movie">Movies</option>
            <option value="series">Series</option>
          </select>
          <select id="genreFilter" aria-label="Genre filter">
            <option value="all">Todos los generos</option>
          </select>
          <button id="logoutBtn" class="ghost" type="button" title="Cerrar sesión">Salir</button>
        </div>
      </section>

      <section class="layout">
        <section class="catalog">
          <div class="catalog-header">
            <h2>Results</h2>
            <div class="catalog-header-tools">
              <span id="count">0 items</span>
              <select id="sortFilter" aria-label="Sort catalog">
                <option value="relevance">Relevancia</option>
                <option value="az">Titulo A-Z</option>
                <option value="za">Titulo Z-A</option>
                <option value="year_desc">Ano mas reciente</option>
                <option value="year_asc">Ano mas antiguo</option>
                <option value="most_watched">Mas vistos</option>
                <option value="recommended">Recomendado para ti</option>
              </select>
            </div>
          </div>
          <div id="items" class="items"></div>
        </section>

        <section class="detail" id="detail">
          <div class="empty">Search and select a title to preview.</div>
        </section>
      </section>
    </main>

    <script type="module">
      const v = window.__mep_build || Date.now().toString(36);
      import(`./app.js?v=${v}`);
    </script>

    <div id="playerModal" class="player-modal" hidden>
      <div class="player-modal-backdrop" data-close-player></div>
      <div class="player-modal-card">
        <div class="player-controls" id="playerControls"></div>
        <iframe
          id="player"
          src="about:blank"
          allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
          sandbox="allow-scripts allow-same-origin allow-presentation"
          referrerpolicy="strict-origin-when-cross-origin"
        ></iframe>
      </div>
    </div>
  </body>
</html>
