name: Drain watch progress queue

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: watch-progress-sync-queue
  cancel-in-progress: false

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout (main)
        uses: actions/checkout@v4

      - name: Configure git identity
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Drain, commit and push changes (retry-safe)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WATCH_PROGRESS_MAX_ISSUES: "1"
        run: |
          set -euxo pipefail
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git checkout -B main origin/main
            node tools/sync-watch-progress-from-issues.mjs
            git add assets/watch-progress assets/watch-analytics || true
            if git diff --cached --quiet; then
              echo "No staged changes."
              exit 0
            fi
            git commit -m "drain watch-progress queue"
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push rejected on attempt ${attempt}; retrying from latest origin/main"
          done
          echo "Failed to push after retries"
          exit 1

      - name: Close synced watch progress issues
        if: success()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euxo pipefail
          node tools/close-watch-progress-issues.mjs
